<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <title>Kitten Crawler Man</title>
    <meta
      name="description"
      content="A browser-based dungeon crawler where a human and their cat fight through increasingly dangerous floors."
    />
    <meta name="theme-color" content="#1a1a2e" />

    <link rel="icon" type="image/x-icon" href="src/images/website/goblin-icon.ico" />

    <link rel="apple-touch-icon" href="src/images/website/goblin-icon.jpg" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Kitten Crawler Man" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="application-name" content="Kitten Crawler Man" />

    <link rel="manifest" href="manifest.json" />

    <script src="dist/bundle.js" defer></script>
    <link rel="stylesheet" href="main.css" />
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('./sw.js').catch(() => {});
        });
      }
    </script>
  </head>
  <body>
    <div id="game"></div>
  </body>
</html>
